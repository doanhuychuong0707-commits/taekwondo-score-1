<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDg3vwSaRq65XTAlxKLiqNc13cE0mT5Rmo",
  authDomain: "taekwondo-score-f908b.firebaseapp.com",
  databaseURL: "https://taekwondo-score-f908b-default-rtdb.firebaseio.com",
  projectId: "taekwondo-score-f908b",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addScore = function(team, value) {
  set(ref(db, "score"), {
    team: team,
    value: value
  });
};
</script>

<h2>CONTROL</h2>

<button onclick="addScore('red',1)">RED +1</button>
<button onclick="addScore('blue',1)">BLUE +1</button>
