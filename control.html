<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control TKD</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
}

/* LAYOUT NGANG THẬT */
.main{
  display:flex;
  height:100vh;
}

/* TEAM */
.team{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.red{ background:#ffe5e5; }
.blue{ background:#e5f0ff; }

/* CENTER */
.center{
  width:30%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#ddd;
}

/* BUTTON */
button{
  margin:6px;
  padding:16px 22px;
  font-size:20px;
  border:none;
  border-radius:10px;
}

/* ❗ Nếu cầm dọc → hiển thị cảnh báo */
@media (orientation:portrait){
  body::before{
    content:"👉 Hãy xoay ngang điện thoại để dùng";
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    z-index:999;
  }
}
</style>

</head>

<body>

<div class="main">

  <!-- RED -->
  <div class="team red">
    <h3>🔴 ĐỎ</h3>
    <button onclick="add('red',1)">+1</button>
    <button onclick="add('red',2)">+2</button>
    <button onclick="add('red',3)">+3</button>
    <button onclick="add('red',-1)">-1</button>
    <br>
    <button onclick="gamjeom('red')">⚠ Gam-jeom</button>
  </div>

  <!-- CENTER -->
  <div class="center">
    <h3>⏱ TIME</h3>
    <button onclick="startTimer()">▶️ START</button>
    <button onclick="pauseTimer()">⏸ PAUSE</button>

    <h3>🔁 ROUND</h3>
    <button onclick="setRound(1)">R1</button>
    <button onclick="setRound(2)">R2</button>
    <button onclick="setRound(3)">R3</button>

    <br>
    <button onclick="reset()">🔄 RESET</button>
  </div>

  <!-- BLUE -->
  <div class="team blue">
    <h3>🔵 XANH</h3>
    <button onclick="add('blue',1)">+1</button>
    <button onclick="add('blue',2)">+2</button>
    <button onclick="add('blue',3)">+3</button>
    <button onclick="add('blue',-1)">-1</button>
    <br>
    <button onclick="gamjeom('blue')">⚠ Gam-jeom</button>
  </div>

</div>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDg3vwSaRq65XTAlxKLiqNc13cE0mT5Rmo",
  authDomain: "taekwondo-score-f908b.firebaseapp.com",
  databaseURL: "https://taekwondo-score-f908b-default-rtdb.firebaseio.com",
  projectId: "taekwondo-score-f908b",
  appId: "1:395923611117:web:ab9c6d992a1c0951025be4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let timer = null;

/* SCORE */
function add(team, point){
  const r = db.ref("match/" + team + "Score");
  r.once("value").then(s=>{
    let v = s.val() || 0;
    v += point;
    if(v < 0) v = 0;
    r.set(v);
  });
}

/* GAMJEOM */
function gamjeom(team){
  const g = db.ref("match/" + team + "Gamjeom");
  g.once("value").then(s=>{
    let v = s.val() || 0;

    if(v < 20){
      g.set(v + 1);

      let opp = team === "red" ? "blue" : "red";
      db.ref("match/" + opp + "Score")
        .once("value")
        .then(s2=>{
          db.ref("match/" + opp + "Score")
            .set((s2.val() || 0) + 1);
        });
    }
  });
}

/* TIMER */
function startTimer(){
  db.ref("match").update({ running:true });

  if(timer) return;

  timer = setInterval(()=>{
    const tRef = db.ref("match/time");
    tRef.once("value").then(s=>{
      let t = s.val() || 0;

      if(t > 0){
        tRef.set(t - 1);
      }else{
        clearInterval(timer);
        timer = null;
        db.ref("match").update({ running:false });
      }
    });
  },1000);
}

function pauseTimer(){
  db.ref("match").update({ running:false });

  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

/* ROUND */
function setRound(r){
  db.ref("match").update({
    round:r,
    time:120,
    running:false
  });

  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

/* RESET */
function reset(){
  if(timer){
    clearInterval(timer);
    timer = null;
  }

  db.ref("match").set({
    redScore:0,
    blueScore:0,
    redGamjeom:0,
    blueGamjeom:0,
    time:120,
    running:false,
    round:1
  });
}
</script>

</body>
</html>
