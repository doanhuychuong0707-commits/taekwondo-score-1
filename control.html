<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control TKD</title>

<style>
body{
  font-family:Arial;
  margin:0;
  overflow:hidden;
}

/* XOAY NGANG CHUẨN */
@media screen and (orientation:portrait){
  body{
    transform: rotate(90deg);
    transform-origin: top left;

    width:100vh;
    height:100vw;

    position:absolute;
    top:0;
    left:0;
  }
}

/* LAYOUT */
.main{
  display:flex;
  width:100vw;
  height:100vh;
}

/* TEAM */
.team{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.red{ background:#ffe5e5; }
.blue{ background:#e5f0ff; }

/* BUTTON */
button{
  margin:6px;
  padding:14px 20px;
  font-size:20px;
  border:none;
  border-radius:10px;
}

/* CENTER */
.center{
  width:30%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#ddd;
}

h3{
  margin:10px 0;
}
</style>

</head>

<body>

<div class="main">

  <!-- RED -->
  <div class="team red">
    <h3>🔴 ĐỎ</h3>
    <button onclick="add('red',1)">+1</button>
    <button onclick="add('red',2)">+2</button>
    <button onclick="add('red',3)">+3</button>
    <button onclick="add('red',-1)">-1</button>
    <br>
    <button onclick="gamjeom('red')">⚠ Gam-jeom</button>
  </div>

  <!-- CENTER -->
  <div class="center">

    <h3>⏱ TIME</h3>
    <button onclick="startTimer()">▶️ START</button>
    <button onclick="pauseTimer()">⏸ PAUSE</button>

    <h3>🔁 ROUND</h3>
    <button onclick="setRound(1)">R1</button>
    <button onclick="setRound(2)">R2</button>
    <button onclick="setRound(3)">R3</button>

    <br>
    <button onclick="reset()">🔄 RESET</button>

  </div>

  <!-- BLUE -->
  <div class="team blue">
    <h3>🔵 XANH</h3>
    <button onclick="add('blue',1)">+1</button>
    <button onclick="add('blue',2)">+2</button>
    <button onclick="add('blue',3)">+3</button>
    <button onclick="add('blue',-1)">-1</button>
    <br>
    <button onclick="gamjeom('blue')">⚠ Gam-jeom</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set, update }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDg3vwSaRq65XTAlxKLiqNc13cE0mT5Rmo",
  authDomain: "taekwondo-score-f908b.firebaseapp.com",
  databaseURL: "https://taekwondo-score-f908b-default-rtdb.firebaseio.com",
  projectId: "taekwondo-score-f908b",
  appId: "1:395923611117:web:ab9c6d992a1c0951025be4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const matchRef = ref(db, "match");

let timer = null;

/* SCORE */
window.add = async function(team, point){
  const r = ref(db, "match/" + team + "Score");
  const snap = await get(r);
  let val = snap.val() || 0;

  val += point;
  if(val < 0) val = 0;

  set(r, val);
}

/* GAMJEOM */
window.gamjeom = async function(team){
  const g = ref(db, "match/" + team + "Gamjeom");
  const snap = await get(g);
  let val = snap.val() || 0;

  if(val < 20){
    set(g, val + 1);

    let opp = team === "red" ? "blue" : "red";
    const s = ref(db, "match/" + opp + "Score");
    const snap2 = await get(s);
    set(s, (snap2.val() || 0) + 1);
  }
}

/* TIMER */
window.startTimer = function(){
  update(matchRef, { running: true });

  if(timer) return;

  timer = setInterval(async () => {
    const tRef = ref(db, "match/time");
    const snap = await get(tRef);
    let time = snap.val() || 0;

    if(time > 0){
      set(tRef, time - 1);
    } else {
      clearInterval(timer);
      timer = null;
      update(matchRef, { running: false });
    }
  }, 1000);
}

window.pauseTimer = function(){
  update(matchRef, { running: false });

  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

/* ROUND */
window.setRound = function(r){
  update(matchRef, {
    round: r,
    time: 120,
    running: false
  });

  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

/* RESET */
window.reset = function(){
  if(timer){
    clearInterval(timer);
    timer = null;
  }

  set(matchRef, {
    redScore: 0,
    blueScore: 0,
    redGamjeom: 0,
    blueGamjeom: 0,
    time: 120,
    running: false,
    round: 1
  });
}
</script>

</body>
</html>
